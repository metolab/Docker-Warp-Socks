services:
    # test:
    #     image: curlimages/curl
    #     network_mode: host
    #     depends_on:
    #         - warp-socks: {condition: service_healthy}
    #     command: curl --proxy socks5h://127.0.0.1:12302 https://www.cloudflare.com/cdn-cgi/trace

    warp-socks:
        image: ghcr.io/metolab/docker-warp-socks:v7
        network_mode: host
        environment:
            DW_AUTH: user:password
            DW_FEATURE: ss=12300,warp=12301,socks=12302,http=12303
        healthcheck:
            test: ["CMD", "curl", "-f", "https://www.cloudflare.com/cdn-cgi/trace"]
            interval: 30s
            timeout: 10s
            retries: 5
